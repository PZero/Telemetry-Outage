<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="128" fill="#0e1117" />
  
  <g filter="url(#shadow)">
    <!-- Shield/Ring outline for Outage/Integrity -->
    <circle cx="256" cy="256" r="160" stroke="url(#grad1)" stroke-width="24" fill="none" stroke-dasharray="700 300" stroke-linecap="round" transform="rotate(-45 256 256)" />
    
    <!-- Heartbeat/Telemetry waves inside -->
    <path d="M160 256 h40 l20 -60 l30 120 l25 -90 l15 30 h62" stroke="#10b981" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Pulse glowing dot -->
    <circle cx="352" cy="256" r="12" fill="#3b82f6" />
  </g>
</svg>
